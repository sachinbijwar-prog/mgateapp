<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visitor Gate Pass</title>
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header>
        <div style="flex: 1;">
            <h1>ARV Royale D Wing - Gate Manager</h1>
            <div id="current-guard-display"
                style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; display: none;">
                Guard on Duty: <span id="guard-name-text" style="color: var(--primary); font-weight: 600;"></span>
                <button onclick="handleLogout()" class="btn-switch" style="margin-left: 8px;">Switch</button>
            </div>
        </div>
        <div class="status-indicator">
            <div class="dot" id="sync-dot"></div>
            <span id="sync-text">Live Sync</span>
        </div>
    </header>

    <!-- Login View (Overlay) -->
    <section id="view-login" class="view">
        <div class="login-card">
            <div style="color: var(--primary); margin-bottom: 1rem;">
                <i data-lucide="shield-check" style="width: 48px; height: 48px;"></i>
            </div>
            <h2>Who is on Duty?</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.875rem;">Select your name to start
                recording entries.</p>
            <div class="form-group" style="text-align: left;">
                <label for="guard-select">Select Guard Name</label>
                <select id="guard-select"
                    style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border);">
                    <option value="">-- Choose Name --</option>
                    <option value="Deepak Chavan">Deepak Chavan</option>
                    <option value="Dudh Nath">Dudh Nath</option>
                </select>
            </div>
            <button onclick="handleLogin()" class="btn-primary" style="margin-top: 1rem; width: 100%;">Start
                Duty</button>
        </div>
    </section>

    <main class="container">
        <!-- Dashboard / Active Visitors -->
        <section id="view-active" class="view">
            <h2 style="margin-bottom: 1rem; font-size: 1rem; color: var(--text-muted);">Current Visitors</h2>
            <div id="active-list">
                <!-- Active visitors will be injected here -->
                <div class="empty-state" style="text-align: center; padding: 3rem 1rem; color: var(--text-muted);">
                    <p>No active visitors at the moment.</p>
                </div>
            </div>
        </section>

        <!-- New Entry Form -->
        <section id="view-new" class="view">
            <h2 style="margin-bottom: 1.5rem;">New Visitor Entry</h2>
            <form id="entry-form">
                <div class="form-group">
                    <label for="visitor-name">Visitor Name</label>
                    <input type="text" id="visitor-name" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <label for="visitor-phone">Phone Number</label>
                    <input type="tel" id="visitor-phone" placeholder="10 Digit Mobile Number" required pattern="\d{10}"
                        title="Please enter exactly 10 digits"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)">
                </div>
                <div class="form-group">
                    <label for="visitor-flat">Flat / Unit Number</label>
                    <input list="flat-numbers" id="visitor-flat" placeholder="Select or Type Flat" required>
                    <datalist id="flat-numbers">
                        <!-- Will be populated by JS -->
                    </datalist>
                </div>
                <div class="form-group">
                    <label for="visitor-purpose">Purpose of Visit</label>
                    <select id="visitor-purpose">
                        <option value="Delivery">Delivery (Zomato/Amazon/etc)</option>
                        <option value="Guest">Guest / Friend</option>
                        <option value="Maintenance">Maintenance / Repair</option>
                        <option value="Service">Service (Maid/Cook)</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="visitor-vehicle">Vehicle Number (Optional)</label>
                    <input type="text" id="visitor-vehicle" placeholder="e.g. MH-12-AB-1234">
                </div>
                <button type="submit" class="btn-primary">Record Entry</button>
            </form>
        </section>

        <!-- History -->
        <section id="view-history" class="view">
            <h2 style="margin-bottom: 1rem; font-size: 1rem; color: var(--text-muted);">Recent Logs</h2>
            <div id="history-list">
                <!-- History logs will be injected here -->
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchView('active', this)">
            <i data-lucide="users"></i>
            <span>Active</span>
        </div>
        <div class="nav-item" onclick="switchView('new', this)">
            <i data-lucide="user-plus"></i>
            <span>New Entry</span>
        </div>
        <div class="nav-item" onclick="switchView('history', this)">
            <i data-lucide="history"></i>
            <span>History</span>
        </div>
    </nav>

    <!-- Application Logic (Merged for Reliability) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, updateDoc, serverTimestamp, orderBy, limit, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Global State
        let currentGuard = localStorage.getItem('guardName');

        const firebaseConfig = {
            apiKey: "AIzaSyAYYZorlb34helzlTvB92oVoashRpgVhjc",
            authDomain: "arvdmygate.firebaseapp.com",
            projectId: "arvdmygate",
            storageBucket: "arvdmygate.firebasestorage.app",
            messagingSenderId: "702583778665",
            appId: "1:702583778665:web:5d6bdddab6fd17ae6c21f8"
        };

        let db;
        let isFirebaseConfigured = false;

        const populateFlats = () => {
            const list = document.getElementById('flat-numbers');
            const flats = [];
            flats.push('104', '105');
            flats.push('201', '202', '204', '205');
            for (let f = 3; f <= 11; f++) {
                for (let u = 1; u <= 6; u++) {
                    flats.push(`${f}${u.toString().padStart(2, '0')}`);
                }
            }
            list.innerHTML = flats.map(f => `<option value="${f}">`).join('');
        };

        const init = async () => {
            populateFlats();
            if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") {
                try {
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    isFirebaseConfigured = true;
                    document.getElementById('sync-dot').style.background = '#22c55e';
                    document.getElementById('sync-text').innerText = 'Live Sync Active';

                    enableIndexedDbPersistence(db).catch((err) => {
                        console.error("Persistence Error: ", err.code);
                    });
                } catch (e) {
                    console.error("Init Error: ", e.message);
                }
            } else {
                document.getElementById('sync-dot').style.background = '#eab308';
                document.getElementById('sync-text').innerText = 'Demo Mode (Offline)';
            }

            checkLoginState();
            loadActiveVisitors();
            loadHistory();
        };

        // UI Elements
        const activeList = document.getElementById('active-list');
        const historyList = document.getElementById('history-list');
        const entryForm = document.getElementById('entry-form');

        const checkLoginState = () => {
            if (!currentGuard) {
                switchView('login');
                document.getElementById('current-guard-display').style.display = 'none';
            } else {
                document.getElementById('guard-name-text').innerText = currentGuard;
                document.getElementById('current-guard-display').style.display = 'block';
                if (document.getElementById('view-login').classList.contains('active')) {
                    switchView('active', document.querySelector('.nav-item'));
                }
            }
        };

        window.handleLogin = () => {
            const name = document.getElementById('guard-select').value;
            if (!name) {
                alert("Please select your name.");
                return;
            }
            localStorage.setItem('guardName', name);
            currentGuard = name;
            checkLoginState();
        };

        window.handleLogout = () => {
            if (confirm("Switch to a different guard?")) {
                localStorage.removeItem('guardName');
                currentGuard = null;
                checkLoginState();
            }
        };

        const formatTime = (date) => {
            if (!date) return '---';
            const d = date instanceof Date ? date : date.toDate();
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        };

        const formatDate = (date) => {
            if (!date) return '';
            const d = date instanceof Date ? date : date.toDate();
            return d.toLocaleDateString([], { day: 'numeric', month: 'short' });
        };

        const loadActiveVisitors = () => {
            if (!isFirebaseConfigured) {
                const localData = JSON.parse(localStorage.getItem('visitors') || '[]');
                renderVisitors(localData.filter(v => v.status === 'active'));
                return;
            }
            const q = query(collection(db, "visitors"), where("status", "==", "active"));
            onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                data.sort((a, b) => (b.timeIn?.seconds || 0) - (a.timeIn?.seconds || 0));
                renderVisitors(data);
            }, (error) => {
                console.error("Load Error: ", error.message);
            });
        };

        const loadHistory = () => {
            if (!isFirebaseConfigured) {
                const localData = JSON.parse(localStorage.getItem('visitors') || '[]');
                renderHistory(localData.filter(v => v.status === 'exited').sort((a, b) => b.timeOut - a.timeOut));
                return;
            }
            const q = query(collection(db, "visitors"), where("status", "==", "exited"), limit(50));
            onSnapshot(q, (snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                data.sort((a, b) => (b.timeOut?.seconds || 0) - (a.timeOut?.seconds || 0));
                renderHistory(data);
            });
        };

        const renderVisitors = (data) => {
            if (data.length === 0) {
                activeList.innerHTML = `<div class="empty-state" style="text-align: center; padding: 3rem 1rem; color: var(--text-muted);"><p>No active visitors at the moment.</p></div>`;
                return;
            }
            activeList.innerHTML = data.map(v => `
                <div class="visitor-card">
                    <div class="visitor-info">
                        <h3>${v.name}</h3>
                        <p>${v.purpose} • Flat ${v.flat}</p>
                        <p style="font-size: 0.75rem;">Entered: ${formatTime(v.timeIn)}</p>
                        <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">Recorded by: ${v.recordedBy || 'System'}</p>
                        ${v.vehicle ? `<p style="font-size: 0.75rem; color: var(--primary);">🚗 ${v.vehicle}</p>` : ''}
                    </div>
                    <button class="btn-exit" onclick="handleExitClick('${v.id}')">EXIT</button>
                </div>
            `).join('');
        };

        const renderHistory = (data) => {
            if (data.length === 0) {
                historyList.innerHTML = `<p style="text-align:center; padding: 2rem; color: var(--text-muted);">No history logs yet.</p>`;
                return;
            }
            historyList.innerHTML = data.map(v => `
                <div class="history-item">
                    <div style="display:flex; justify-content: space-between; margin-bottom: 4px;">
                        <span style="font-weight:600">${v.name}</span>
                        <span style="font-size: 0.75rem; color: var(--text-muted);">${formatDate(v.timeIn)}</span>
                    </div>
                    <div style="font-size: 0.875rem; color: var(--text-muted);">${v.flat} • ${v.purpose}</div>
                    <div style="font-size: 0.75rem; margin-top: 4px;">In: ${formatTime(v.timeIn)} • Out: ${formatTime(v.timeOut)}</div>
                    <div style="font-size: 0.65rem; color: var(--text-muted); margin-top: 2px;">Guard: ${v.recordedBy || '---'}</div>
                </div>
            `).join('');
        };

        entryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newVisitor = {
                name: document.getElementById('visitor-name').value,
                phone: document.getElementById('visitor-phone').value,
                flat: document.getElementById('visitor-flat').value,
                purpose: document.getElementById('visitor-purpose').value,
                vehicle: document.getElementById('visitor-vehicle').value,
                status: 'active',
                recordedBy: currentGuard,
                timeIn: isFirebaseConfigured ? serverTimestamp() : new Date()
            };

            if (isFirebaseConfigured) {
                try {
                    await addDoc(collection(db, "visitors"), newVisitor);
                    alert("Visitor Entry Saved!");
                } catch (error) {
                    alert("Error: " + error.message);
                }
            } else {
                const localData = JSON.parse(localStorage.getItem('visitors') || '[]');
                newVisitor.id = Date.now().toString();
                localData.push(newVisitor);
                localStorage.setItem('visitors', JSON.stringify(localData));
                loadActiveVisitors();
            }
            entryForm.reset();
            window.switchView('active', document.querySelector('.nav-item'));
        });

        window.handleExitClick = async (id) => {
            if (isFirebaseConfigured) {
                const ref = doc(db, "visitors", id);
                await updateDoc(ref, { status: 'exited', timeOut: serverTimestamp() });
            } else {
                const localData = JSON.parse(localStorage.getItem('visitors') || '[]');
                const idx = localData.findIndex(v => v.id === id);
                if (idx !== -1) {
                    localData[idx].status = 'exited';
                    localData[idx].timeOut = new Date();
                    localStorage.setItem('visitors', JSON.stringify(localData));
                    loadActiveVisitors();
                    loadHistory();
                }
            }
        };

        // View Switching
        window.switchView = (viewId, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if (el) el.classList.add('active');
        };

        // Start App
        window.addEventListener('load', () => {
            lucide.createIcons();
            init();
        });

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>

</html>
